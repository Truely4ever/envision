<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    :root {
      --text: #10233f;
      --muted: #64748b;
      --primary: #0f62fe;
      --primary-dark: #0948bd;
      --surface: rgba(255, 255, 255, 0.92);
      --line: rgba(16, 35, 63, 0.1);
      --success: #15803d;
      --danger: #dc2626;
      --shadow: 0 24px 50px rgba(15, 98, 254, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 98, 254, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.15), transparent 28%),
        linear-gradient(180deg, #eef4ff 0%, #f8fbff 52%, #eef8f4 100%);
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 10px;
      background: linear-gradient(135deg, #10233f, #0f62fe);
      color: #fff;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      line-height: 1.6;
    }

    .body {
      padding: 24px 28px 28px;
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 0.96rem;
      outline: none;
    }

    input:focus {
      border-color: rgba(15, 98, 254, 0.42);
      box-shadow: 0 0 0 4px rgba(15, 98, 254, 0.12);
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    button {
      border: none;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    a {
      color: var(--primary-dark);
      background: rgba(15, 98, 254, 0.08);
    }

    .message {
      min-height: 24px;
      font-weight: 700;
    }

    .success {
      color: var(--success);
    }

    .error {
      color: var(--danger);
    }

    .hint {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(15, 98, 254, 0.06);
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <h1>Admin Access</h1>
      <p>Only authorized admins can open the dashboard and manage voting data.</p>
    </section>

    <section class="body">
      <div>
        <label for="username">Admin Username</label>
        <input id="username" type="text" placeholder="Enter admin username">
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password">
      </div>

      <button onclick="login()">Login To Dashboard</button>
      <p id="message" class="message"></p>

      <div class="hint">
        Student login is separate and only uses enrollment numbers on the main voting page.
      </div>

      <a href="/">Back To Student Voting</a>
    </section>
  </main>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      if (!username || !password) {
        message.innerHTML = "<span class='error'>Please enter username and password.</span>";
        return;
      }

      try {
        const res = await fetch("/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          message.innerHTML = `<span class="error">${data.message || "Login failed"}</span>`;
          return;
        }

        message.innerHTML = "<span class='success'>Login successful. Redirecting...</span>";
        window.location.href = "/admin/dashboard";
      } catch (error) {
        message.innerHTML = "<span class='error'>Could not connect to the server.</span>";
      }
    }
  </script>
</body>
</html>
